<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>NHM — Content Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--red:#da3123;--bg:#0a0a0a;--ink:#f5f4f1;--ink-dim:#8a8784;--ink-faint:#3a3a38;--line:#1f1f1d}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Archivo',system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45}
  a{color:var(--red)}
  .wrap{max-width:820px;margin:0 auto;padding:40px 22px 120px}
  .brand{display:inline-flex;border:2px solid var(--ink);padding:6px 10px 4px;font-family:'Archivo Black',sans-serif;font-size:16px;text-transform:uppercase;letter-spacing:.01em}
  .mono{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim)}
  h1{font-family:'Archivo Black',sans-serif;text-transform:uppercase;font-size:30px;letter-spacing:-.01em;margin:18px 0 6px}

  /* login */
  #login{max-width:380px;margin:14vh auto 0;text-align:center}
  #login .brand{margin-bottom:26px}
  #login input{width:100%;background:#0e0e0c;border:2px solid var(--line);color:var(--ink);font-family:'Archivo',sans-serif;font-size:16px;padding:15px 16px;outline:none;transition:border-color .15s}
  #login input:focus{border-color:var(--red)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#0a0a0a;border:none;font-family:'Archivo Black',sans-serif;text-transform:uppercase;font-size:14px;letter-spacing:.04em;padding:15px 24px;cursor:pointer;transition:filter .15s,transform .15s}
  .btn:hover{filter:brightness(.9)}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.full{width:100%;margin-top:14px}
  .btn.ghost{background:transparent;color:var(--ink-dim);border:1px solid var(--line)}
  .err{color:var(--red);font-size:13px;margin-top:12px;min-height:18px}

  /* editor */
  #editor{display:none}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:8px}
  .group{margin-top:40px}
  .group h2{font-family:'Archivo Black',sans-serif;text-transform:uppercase;font-size:14px;letter-spacing:.1em;color:var(--red);border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:18px}
  .field{margin-bottom:20px}
  .field label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:7px}
  .field textarea{width:100%;background:#0e0e0c;border:1px solid var(--line);color:var(--ink);font-family:'Archivo',sans-serif;font-size:15px;line-height:1.5;padding:12px 14px;outline:none;resize:vertical;transition:border-color .15s}
  .field textarea:focus{border-color:var(--red)}

  /* sticky save bar */
  .savebar{position:fixed;left:0;right:0;bottom:0;background:rgba(10,10,10,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:14px 22px;display:none;align-items:center;justify-content:space-between;gap:16px;z-index:20}
  .savebar.show{display:flex}
  .savebar .status{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-dim)}
  .savebar .status.ok{color:#5ec76a}
  .savebar .status.bad{color:var(--red)}
  .savebar .actions{display:flex;gap:10px}
</style>
</head>
<body>
<div class="wrap">

  <!-- LOGIN -->
  <div id="login">
    <div class="brand">NHM</div>
    <div class="mono" style="margin-bottom:22px">Content Editor</div>
    <form id="loginForm">
      <input id="password" type="password" placeholder="Admin password" autocomplete="current-password" autofocus>
      <button class="btn full" type="submit" id="loginBtn">Log in</button>
    </form>
    <div class="err" id="loginErr"></div>
  </div>

  <!-- EDITOR -->
  <div id="editor">
    <div class="topbar">
      <div>
        <div class="brand">NHM</div>
        <h1>Edit site copy</h1>
        <div class="mono">Changes publish in ~30 seconds after saving.</div>
      </div>
      <button class="btn ghost" id="logoutBtn" type="button">Log out</button>
    </div>
    <div id="groups"></div>
  </div>
</div>

<!-- STICKY SAVE BAR -->
<div class="savebar" id="savebar">
  <div class="status" id="status">Unsaved changes</div>
  <div class="actions">
    <button class="btn ghost" id="resetBtn" type="button">Discard</button>
    <button class="btn" id="saveBtn" type="button">Save &amp; publish</button>
  </div>
</div>

<script>
  var loginEl = document.getElementById('login');
  var editorEl = document.getElementById('editor');
  var groupsEl = document.getElementById('groups');
  var savebar = document.getElementById('savebar');
  var statusEl = document.getElementById('status');
  var loginErr = document.getElementById('loginErr');

  var original = null;   // pristine content
  var state = null;      // working copy

  // friendly labels
  var PAGE_LABEL = { index: 'Landing page', donate: 'Donate page', recap: 'Recap page' };
  function humanize(k){ return k.replace(/_/g,' ').replace(/\b\w/g, function(c){return c.toUpperCase();}); }

  function show(el){ el.style.display = 'block'; }
  function hide(el){ el.style.display = 'none'; }

  // ---- auth bootstrap ----
  fetch('/api/login').then(function(r){return r.json();}).then(function(d){
    if (d && d.authed) startEditor();
  }).catch(function(){});

  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    var btn = document.getElementById('loginBtn');
    var pw = document.getElementById('password').value;
    loginErr.textContent = '';
    btn.disabled = true; btn.textContent = 'Checking…';
    fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: pw }) })
      .then(function(r){ return r.json().then(function(j){ return { ok:r.ok, j:j }; }); })
      .then(function(res){
        if (res.ok && res.j.ok) { startEditor(); }
        else { loginErr.textContent = (res.j && res.j.error) || 'Login failed'; }
      })
      .catch(function(){ loginErr.textContent = 'Network error'; })
      .finally(function(){ btn.disabled = false; btn.textContent = 'Log in'; });
  });

  document.getElementById('logoutBtn').addEventListener('click', function(){
    fetch('/api/logout', { method:'POST' }).finally(function(){ location.reload(); });
  });

  function startEditor(){
    hide(loginEl); show(editorEl);
    fetch('/api/content', { cache:'no-store' }).then(function(r){ return r.json(); }).then(function(data){
      original = JSON.parse(JSON.stringify(data || {}));
      state = JSON.parse(JSON.stringify(data || {}));
      render();
    });
  }

  function render(){
    groupsEl.innerHTML = '';
    Object.keys(state).forEach(function(page){
      var g = document.createElement('div'); g.className = 'group';
      var h = document.createElement('h2'); h.textContent = PAGE_LABEL[page] || page; g.appendChild(h);
      Object.keys(state[page]).forEach(function(field){
        var wrap = document.createElement('div'); wrap.className = 'field';
        var lab = document.createElement('label'); lab.textContent = humanize(field); wrap.appendChild(lab);
        var ta = document.createElement('textarea');
        ta.value = state[page][field];
        ta.rows = Math.min(8, Math.max(2, Math.ceil((ta.value.length || 0) / 70)));
        ta.addEventListener('input', function(){
          state[page][field] = ta.value;
          markDirty();
        });
        wrap.appendChild(ta);
        g.appendChild(wrap);
      });
      groupsEl.appendChild(g);
    });
  }

  function dirty(){ return JSON.stringify(original) !== JSON.stringify(state); }
  function markDirty(){
    if (dirty()) { savebar.classList.add('show'); statusEl.textContent = 'Unsaved changes'; statusEl.className = 'status'; }
    else savebar.classList.remove('show');
  }

  document.getElementById('resetBtn').addEventListener('click', function(){
    state = JSON.parse(JSON.stringify(original));
    render(); savebar.classList.remove('show');
  });

  document.getElementById('saveBtn').addEventListener('click', function(){
    var btn = document.getElementById('saveBtn');
    btn.disabled = true; statusEl.textContent = 'Saving…'; statusEl.className = 'status';
    fetch('/api/save', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ content: state }) })
      .then(function(r){ return r.json().then(function(j){ return { ok:r.ok, j:j }; }); })
      .then(function(res){
        if (res.ok && res.j.ok) {
          original = JSON.parse(JSON.stringify(state));
          statusEl.textContent = 'Saved — live in ~30s'; statusEl.className = 'status ok';
          setTimeout(function(){ savebar.classList.remove('show'); }, 2500);
        } else {
          statusEl.textContent = (res.j && res.j.error) || 'Save failed'; statusEl.className = 'status bad';
        }
      })
      .catch(function(){ statusEl.textContent = 'Network error'; statusEl.className = 'status bad'; })
      .finally(function(){ btn.disabled = false; });
  });

  window.addEventListener('beforeunload', function(e){ if (dirty()) { e.preventDefault(); e.returnValue = ''; } });
</script>
</body>
</html>
